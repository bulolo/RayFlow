services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile.prod
    container_name: rayflow_backend
    env_file:
      - .env
    volumes:
      - ${RAYFLOW_KUBECONFIG_DIR:-${HOME}/.kube}:/root/.kube:ro
    environment:
      - RAYFLOW_WORKER_URL=http://worker:8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flink:
        condition: service_started
      rustfs-init:
        condition: service_completed_successfully
      worker:
        condition: service_healthy

  # ── Image Build Worker (Docker-in-Docker) ─────────────────────────────────
  # Runs docker buildx in isolation. Backend submits build tasks here via HTTP.
  # Only this container is privileged; backend no longer mounts the host socket.
  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: rayflow_worker
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
      - WORKER_PORT=8090
    volumes:
      - worker_docker_data:/var/lib/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8090/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile.prod
    container_name: rayflow_admin
    env_file:
      - .env.admin.local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: rayflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: rayflow_postgres
    environment:
      POSTGRES_DB: rayflow
      POSTGRES_USER: rayflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    command: ["postgres", "-c", "timezone=UTC"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rayflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rayflow_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: rayflow_rustfs
    restart: unless-stopped
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RAYFLOW_ARTIFACT_S3_ACCESS_KEY:?RAYFLOW_ARTIFACT_S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${RAYFLOW_ARTIFACT_S3_SECRET_KEY:?RAYFLOW_ARTIFACT_S3_SECRET_KEY is required}
      RUSTFS_CONSOLE_ENABLE: "true"
      TZ: ${RAYFLOW_TIMEZONE:-Asia/Shanghai}
    volumes:
      - rustfs_data:/data

  rustfs-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: rayflow_rustfs_init
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        until mc alias set rayflow http://rustfs:9000 ${RAYFLOW_ARTIFACT_S3_ACCESS_KEY:?RAYFLOW_ARTIFACT_S3_ACCESS_KEY is required} ${RAYFLOW_ARTIFACT_S3_SECRET_KEY:?RAYFLOW_ARTIFACT_S3_SECRET_KEY is required}; do sleep 2; done &&
        mc mb --ignore-existing rayflow/${RAYFLOW_ARTIFACT_S3_BUCKET:-rayflow-artifacts} &&
        mc mb --ignore-existing rayflow/${RAYFLOW_LAKE_S3_BUCKET:-rayflow-lake}
      "

  flink:
    image: ${FLINK_IMAGE:-flink:2.2.1}
    container_name: rayflow_flink
    ports:
      - "${FLINK_REST_PORT:-8081}:8081"
      - "${FLINK_SQL_GATEWAY_PORT:-8083}:8083"
    volumes:
      - ${FLINK_LIB_DIR:-./docker/flink/custom-lib}:/opt/rayflow/flink-lib:ro
    command: >
      bash -c "
        find /opt/rayflow/flink-lib -type f -name '*.jar' -exec cp {} /opt/flink/lib/ \; &&
        mkdir -p /opt/flink/plugins/s3-fs-hadoop &&
        cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /opt/flink/plugins/s3-fs-hadoop/ 2>/dev/null || true &&
        /opt/flink/bin/jobmanager.sh start-foreground &
        /opt/flink/bin/taskmanager.sh start-foreground &
        /opt/flink/bin/sql-gateway.sh start-foreground &
        wait -n
      "
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
        taskmanager.numberOfTaskSlots: 4
        sql-gateway.endpoint.rest.address: 0.0.0.0
        sql-gateway.endpoint.rest.port: 8083
        s3.endpoint: ${RAYFLOW_ARTIFACT_S3_ENDPOINT:-http://rustfs:9000}
        s3.access-key: ${RAYFLOW_ARTIFACT_S3_ACCESS_KEY:?RAYFLOW_ARTIFACT_S3_ACCESS_KEY is required}
        s3.secret-key: ${RAYFLOW_ARTIFACT_S3_SECRET_KEY:?RAYFLOW_ARTIFACT_S3_SECRET_KEY is required}
        s3.path.style.access: true
        s3.region: ${RAYFLOW_ARTIFACT_S3_REGION:-us-east-1}
    networks:
      default:
        aliases:
          - flink-jobmanager
          - flink-sql-gateway
    restart: unless-stopped
    depends_on:
      rustfs-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  rustfs_data:
  worker_docker_data:
