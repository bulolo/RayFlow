server:
  port: 3000
  servlet:
    context-path: /

spring:
  application:
    name: rayflow-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # 数据库配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rayflow}
    username: ${DB_USER:rayflow}
    password: ${DB_PASSWORD:rayflow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-init-sql: SET TIME ZONE 'UTC'

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0.0.1
    baseline-description: RayFlow initial baseline
    validate-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.rayflow.server.model.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志
logging:
  level:
    root: INFO
    com.rayflow: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# RayFlow 自定义配置
rayflow:
  version: ${RAYFLOW_VERSION:0.0.4}
  timezone: ${RAYFLOW_TIMEZONE:UTC}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000  # 24 hours
  security:
    encryption-key: ${RAYFLOW_SECRET_ENCRYPTION_KEY:${JWT_SECRET}}
  super-admin:
    username: ${RAYFLOW_SUPER_ADMIN_USERNAME:}
    password: ${RAYFLOW_SUPER_ADMIN_PASSWORD:}
  default-tenant:
    admin:
      username: ${RAYFLOW_DEFAULT_TENANT_ADMIN_USERNAME:}
      password: ${RAYFLOW_DEFAULT_TENANT_ADMIN_PASSWORD:}
  flink:
    default-parallelism: 1
    savepoint-dir: /tmp/rayflow/savepoints
    rest-connect-timeout-ms: ${FLINK_REST_CONNECT_TIMEOUT_MS:3000}
    rest-read-timeout-ms: ${FLINK_REST_READ_TIMEOUT_MS:120000}
    rest-submit-read-timeout-ms: ${FLINK_REST_SUBMIT_READ_TIMEOUT_MS:300000}
    sql-runner-jar: ${FLINK_SQL_RUNNER_JAR:}
    builtin-runtime:
      name: ${RAYFLOW_BUILTIN_FLINK_RUNTIME_NAME:内置}
      address: ${RAYFLOW_BUILTIN_FLINK_REST_URL:http://flink-jobmanager:8081}
      gateway-address: ${RAYFLOW_BUILTIN_FLINK_SQL_GATEWAY_URL:http://flink-sql-gateway:8083}
      version: ${RAYFLOW_BUILTIN_FLINK_VERSION:2.2.1}
      image: ${RAYFLOW_BUILTIN_FLINK_IMAGE:flink:2.2.1}
  scheduler:
    instance-id: ${RAYFLOW_SCHEDULER_INSTANCE_ID:${HOSTNAME:local}}
  preview:
    callback-base-url: ${RAYFLOW_PREVIEW_CALLBACK_BASE_URL:}
    callback-token: ${RAYFLOW_PREVIEW_CALLBACK_TOKEN:}
    wait-timeout-ms: ${RAYFLOW_PREVIEW_WAIT_TIMEOUT_MS:60000}
  paimon:
    browser:
      cache-ttl-ms: ${RAYFLOW_PAIMON_BROWSER_CACHE_TTL_MS:10800000}
      operation-timeout-ms: ${RAYFLOW_PAIMON_BROWSER_OPERATION_TIMEOUT_MS:30000}
  starrocks:
    browser:
      cache-ttl-ms: ${RAYFLOW_STARROCKS_BROWSER_CACHE_TTL_MS:10800000}
  artifact:
    s3:
      endpoint: ${RAYFLOW_ARTIFACT_S3_ENDPOINT:http://localhost:9010}
      access-key: ${RAYFLOW_ARTIFACT_S3_ACCESS_KEY:rustfsadmin}
      secret-key: ${RAYFLOW_ARTIFACT_S3_SECRET_KEY:rustfsadmin}
      bucket: ${RAYFLOW_ARTIFACT_S3_BUCKET:rayflow-artifacts}
      region: ${RAYFLOW_ARTIFACT_S3_REGION:us-east-1}
